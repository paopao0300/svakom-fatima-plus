<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 玩具控制器 (MCP 蓝牙中继)</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        input[type="range"] { width: 100%; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; margin-bottom: 10px; }
        button:hover { background-color: #0056b3; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #c82333; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .control-item { background: #f1f3f5; padding: 15px; border-radius: 8px; text-align: center; }
        #logArea { width: 100%; height: 200px; background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 10px; box-sizing: border-box; border-radius: 6px; overflow-y: auto; font-size: 0.85rem; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: #ccc; margin-right: 5px; }
        .status-dot.active { background-color: #28a745; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. 连接 MCP 服务器</h2>
        <div class="form-group">
            <label>服务器 URL (无需加 /toy-next)</label>
            <input type="text" id="mcpUrl" value="https://ble-relay-template-production-37e3.up.railway.app">
        </div>
        <div class="form-group">
            <label>连接密码</label>
            <input type="password" id="mcpPassword" value="123456">
        </div>
        <button id="btnConnectMcp" onclick="toggleMcp()">启动 MCP 轮询</button>
        <div><span class="status-dot" id="mcpStatus"></span> 服务器状态: <span id="mcpStatusText">未连接</span></div>
    </div>

    <div class="card">
        <h2>2. 连接蓝牙玩具 (SL278H)</h2>
        <button id="btnConnectBt" onclick="connectBluetooth()">连接蓝牙设备</button>
        <div><span class="status-dot" id="btStatus"></span> 蓝牙状态: <span id="btStatusText">未连接</span></div>
    </div>

    <div class="card">
        <h2>3. 手动控制与测试</h2>
        <div class="controls">
            <div class="control-item">
                <label>震动 (0-10)</label>
                <input type="range" id="vibrateSlider" min="0" max="10" value="0" onchange="sendTestCommand('vibrate', this.value)">
                <span id="vibrateVal">0</span>
            </div>
            <div class="control-item">
                <label>伸缩/摆动 (0-7)</label>
                <input type="range" id="oscillateSlider" min="0" max="7" value="0" onchange="sendTestCommand('oscillate', this.value)">
                <span id="oscillateVal">0</span>
            </div>
            <div class="control-item">
                <label>转动 (0-10)</label>
                <input type="range" id="rotateSlider" min="0" max="10" value="0" onchange="sendTestCommand('rotate', this.value)">
                <span id="rotateVal">0</span>
            </div>
            <div class="control-item">
                <label>加热 (0-1)</label>
                <input type="range" id="heatSlider" min="0" max="1" value="0" onchange="sendTestCommand('heat', this.value)">
                <span id="heatVal">0</span>
            </div>
        </div>
        <button class="danger" style="margin-top: 15px;" onclick="stopAll()">🛑 停止所有功能</button>
    </div>

    <div class="card">
        <h2>运行日志</h2>
        <div id="logArea"></div>
    </div>

    <audio id="keepAliveAudio" loop playsinline>
        <source src="https://img.baibai.cv/f/dZymTQ/30min-osbvow%202.mp4" type="audio/mp4">
    </audio>

    <script>
        // 蓝牙配置参数
        const DEVICE_NAME = 'SL278H';
        const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
        const TX_CHAR_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';

        let bluetoothDevice = null;
        let txCharacteristic = null;
        let mcpInterval = null;
        let isMcpRunning = false;
        let keepAliveInterval = null;

        const logArea = document.getElementById('logArea');
        const audio = document.getElementById('keepAliveAudio');

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.textContent = `[${time}] ${message}`;
            if (type === 'error') div.style.color = '#ff4444';
            if (type === 'cmd') div.style.color = '#00e5ff';
            if (type === 'success') div.style.color = '#00ff00';
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // ================= 蓝牙核心逻辑 =================
        async function connectBluetooth() {
            try {
                log('请求蓝牙设备: ' + DEVICE_NAME);
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: DEVICE_NAME }],
                    optionalServices: [SERVICE_UUID]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);
                
                log('连接 GATT 服务器...');
                const server = await bluetoothDevice.gatt.connect();
                
                log('获取服务: ' + SERVICE_UUID);
                const service = await server.getPrimaryService(SERVICE_UUID);
                
                log('获取写入特征值 (TX): ' + TX_CHAR_UUID);
                txCharacteristic = await service.getCharacteristic(TX_CHAR_UUID);
                
                updateBtStatus(true);
                log('蓝牙连接成功，设备就绪！', 'success');
                
                audio.play().catch(e => log('音频自动播放被拦截，请交互后重试', 'error'));
                startKeepAlive();

            } catch (error) {
                log('蓝牙连接失败: ' + error, 'error');
                updateBtStatus(false);
            }
        }

        function onDisconnected() {
            log('蓝牙已断开连接！', 'error');
            updateBtStatus(false);
            txCharacteristic = null;
            clearInterval(keepAliveInterval);
        }

        function updateBtStatus(connected) {
            const dot = document.getElementById('btStatus');
            const text = document.getElementById('btStatusText');
            if (connected) {
                dot.classList.add('active');
                text.textContent = '已连接';
                document.getElementById('btnConnectBt').textContent = '重新连接设备';
            } else {
                dot.classList.remove('active');
                text.textContent = '未连接';
            }
        }

        // ================= 指令发送逻辑 =================
        async function sendCommand(action, value) {
            if (!txCharacteristic) {
                log('未连接蓝牙设备，无法发送指令', 'error');
                return;
            }

            value = parseInt(value, 10) || 0;
            let dataArray = null;

            const slider = document.getElementById(action + 'Slider');
            const valDisplay = document.getElementById(action + 'Val');
            if (slider && valDisplay) {
                slider.value = value;
                valDisplay.textContent = value;
            }

            switch(action.toLowerCase()) {
                case 'vibrate': 
                    value = Math.min(Math.max(value, 0), 10);
                    dataArray = new Uint8Array([0x55, 0x03, 0x00, 0x00, 0x01, value, 0x00]);
                    break;
                case 'oscillate': 
                    value = Math.min(Math.max(value, 0), 7);
                    dataArray = new Uint8Array([0x55, 0x08, 0x00, 0x00, value, 0x00, 0x00]);
                    break;
                case 'rotate': 
                    value = Math.min(Math.max(value, 0), 10);
                    log(`⚠️ 转动指令尚未配置，当前值: ${value}`, 'error');
                    return; 
                case 'heat':
                    value = Math.min(Math.max(value, 0), 1);
                    log(`⚠️ 加热指令尚未配置，当前值: ${value}`, 'error');
                    return;
                default:
                    log('未知指令类型: ' + action, 'error');
                    return;
            }

            try {
                if (dataArray) {
                    await txCharacteristic.writeValue(dataArray);
                    log(`执行 ${action}: ${value}`, 'cmd');
                }
            } catch (error) {
                log(`发送指令失败: ${error}`, 'error');
            }
        }

        async function stopAll() {
            log('停止所有动作', 'cmd');
            await sendCommand('vibrate', 0);
            await sendCommand('oscillate', 0);
        }

        function sendTestCommand(action, value) {
            sendCommand(action, value);
            if (audio.paused) audio.play();
        }

        function startKeepAlive() {
            if (keepAliveInterval) clearInterval(keepAliveInterval);
            keepAliveInterval = setInterval(async () => {
                if (txCharacteristic) {
                    try { /* 防休眠空转 */ } catch (e) {}
                }
            }, 10000);
        }

        // ================= MCP 轮询与探测逻辑 =================
        function toggleMcp() {
            if (isMcpRunning) stopMcp();
            else startMcp();
        }

        async function startMcp() {
            const baseUrl = document.getElementById('mcpUrl').value.replace(/\/$/, '');
            const url = baseUrl + '/toy-next';
            const password = document.getElementById('mcpPassword').value;
            
            if (!baseUrl) {
                log('请输入 MCP 服务器 URL', 'error');
                return;
            }

            if (mcpInterval) clearInterval(mcpInterval);
            isMcpRunning = true;
            document.getElementById('btnConnectMcp').textContent = '探测中...';
            log('正在探测服务器接受哪种密码格式...');

            // 预设 4 种常见的探测方案
            const strategies = [
                { name: '标准 Authorization', url: url, headers: { 'Authorization': password } },
                { name: 'Bearer 令牌', url: url, headers: { 'Authorization': 'Bearer ' + password } },
                { name: 'URL 参数 (token)', url: `${url}?token=${password}`, headers: {} },
                { name: '无密码 (某些模板玩具端不需要密码)', url: url, headers: {} }
            ];

            let validStrategy = null;

            // 挨个敲门，看哪个能进去
            for (let s of strategies) {
                try {
                    const res = await fetch(s.url, { method: 'GET', headers: s.headers });
                    if (res.status !== 401) { // 只要不是 401，就说明门开了
                        validStrategy = s;
                        log(`探测成功！服务器使用的是: [${s.name}]`, 'success');
                        break;
                    }
                } catch (e) {
                    // 忽略网络错误，继续测下一个
                }
            }

            if (!validStrategy) {
                log('❌ 4种常见密码格式全部被服务器拒绝 (依然401)。', 'error');
                log('👉 请检查：1. Railway 是否真的部署完成了？ 2. 环境变量的名字是对的吗？', 'error');
                stopMcp();
                return;
            }

            // 探测成功，使用正确的方法开始正式轮询
            document.getElementById('btnConnectMcp').textContent = '停止 MCP 轮询';
            document.getElementById('btnConnectMcp').classList.add('danger');
            document.getElementById('mcpStatus').classList.add('active');
            document.getElementById('mcpStatusText').textContent = '轮询中 (300ms)';
            log('🚀 正式启动轮询...');

            let isFetching = false;
            mcpInterval = setInterval(async () => {
                if (isFetching) return; 
                isFetching = true;

                try {
                    const response = await fetch(validStrategy.url, {
                        method: 'GET',
                        headers: validStrategy.headers
                    });

                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    
                    const data = await response.json();
                    if (data && data.command && data.command.action) {
                        const { action, value } = data.command;
                        await sendCommand(action, value);
                    }
                } catch (error) {
                    // 如果轮询中断开，只打日志不刷屏
                    console.log('轮询异常:', error.message);
                } finally {
                    isFetching = false;
                }
            }, 300);
        }

        function stopMcp() {
            isMcpRunning = false;
            if (mcpInterval) {
                clearInterval(mcpInterval);
                mcpInterval = null;
            }
            document.getElementById('btnConnectMcp').textContent = '启动 MCP 轮询';
            document.getElementById('btnConnectMcp').classList.remove('danger');
            document.getElementById('mcpStatus').classList.remove('active');
            document.getElementById('mcpStatusText').textContent = '已停止';
            log('MCP 轮询已停止');
        }
    </script>
</body>
</html>
