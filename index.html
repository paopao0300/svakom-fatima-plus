<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 玩具控制器 - 双持适配版 (SL278H & RX)</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
        input[type="range"] { width: 100%; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; margin-bottom: 10px; }
        button:hover { background-color: #0056b3; }
        button.danger { background-color: #dc3545; }
        button.danger:hover { background-color: #c82333; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .control-item { background: #f1f3f5; padding: 15px; border-radius: 8px; text-align: center; }
        .suck-item { grid-column: span 2; background: #fff0f0; border: 2px solid #ff6b6b; padding: 15px; border-radius: 8px; text-align: center; }
        #logArea { width: 100%; height: 200px; background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 10px; box-sizing: border-box; border-radius: 6px; overflow-y: auto; font-size: 0.85rem; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background-color: #ccc; margin-right: 5px; }
        .status-dot.active { background-color: #28a745; }
        .flex-buttons { display: flex; gap: 10px; }
        .flex-buttons button { margin-bottom: 0; }
        .dev-info { font-size: 0.8rem; color: #666; margin-top: -5px; margin-bottom: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. 连接 MCP 服务器</h2>
        <div class="form-group">
            <label>服务器 URL</label>
            <input type="text" id="mcpUrl" value="https://nurturing-art-production-1cd7.up.railway.app">
        </div>
        <div class="form-group">
            <label>连接密码</label>
            <input type="password" id="mcpPassword" value="123456">
        </div>
        <button id="btnConnectMcp" onclick="toggleMcp()">启动 MCP 轮询</button>
        <div><span class="status-dot" id="mcpStatus"></span> 服务器状态: <span id="mcpStatusText">未连接</span></div>
    </div>

    <div class="card">
        <h2>2. 连接蓝牙玩具</h2>
        <div class="dev-info">
            请分别点击下方按钮连接对应的物理玩具。
        </div>
        <div class="flex-buttons" style="margin-bottom: 10px;">
            <button id="btnConnectBtDev1" onclick="connectBluetooth('dev1')">🔗 连接体内玩具 (SL278H)</button>
            <button id="btnConnectBtDev2" onclick="connectBluetooth('dev2')" style="background-color: #ff6b6b;">🔗 连接体外玩具 (SL278H-RX)</button>
        </div>
        <div style="margin-bottom: 5px;"><span class="status-dot" id="btStatusDev1"></span> 体内状态: <span id="btStatusTextDev1">未连接</span></div>
        <div><span class="status-dot" id="btStatusDev2"></span> 体外状态: <span id="btStatusTextDev2">未连接</span></div>
    </div>

    <div class="card">
        <h2>3. 手动控制与测试</h2>
        <div class="controls">
            <div class="control-item">
                <label>震动 (体内 0-10)</label>
                <input type="range" id="vibrateSlider" min="0" max="10" value="0" onchange="sendTestCommand('vibrate', this.value)">
                <span id="vibrateVal">0</span>
            </div>
            <div class="control-item">
                <label>伸缩 (体内 0-7)</label>
                <input type="range" id="oscillateSlider" min="0" max="7" value="0" onchange="sendTestCommand('oscillate', this.value)">
                <span id="oscillateVal">0</span>
            </div>
            <div class="suck-item">
                <label>🔥 吮吸 (体外 0-100%)</label>
                <input type="range" id="suckSlider" min="0" max="100" value="0" onchange="sendTestCommand('suck', this.value)">
                <span id="suckVal">0</span> %
            </div>
        </div>
        <button class="danger" style="margin-top: 15px;" onclick="stopAll()">🛑 停止所有动作</button>
    </div>

    <div class="card">
        <h2>运行日志</h2>
        <div id="logArea"></div>
    </div>

    <audio id="keepAliveAudio" loop playsinline>
        <source src="https://img.baibai.cv/f/dZymTQ/30min-osbvow%202.mp4" type="audio/mp4">
    </audio>

    <script>
        // 精准定义各自的蓝牙广播名字
        const NAME_INTERNAL = 'SL278H';
        const NAME_EXTERNAL = 'SL278H-RX'; // 修正为正确的体外名称
        
        const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
        const TX_CHAR_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';

        // 分别存储体内和体外的写特性通道
        let txCharDev1 = null; // 负责震动/伸缩 (体内)
        let txCharDev2 = null; // 负责吮吸 (体外)
        
        let mcpInterval = null;
        let isMcpRunning = false;
        let keepAliveInterval = null;

        const logArea = document.getElementById('logArea');
        const audio = document.getElementById('keepAliveAudio');

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.textContent = `[${time}] ${message}`;
            if (type === 'error') div.style.color = '#ff4444';
            if (type === 'cmd') div.style.color = '#00e5ff';
            if (type === 'success') div.style.color = '#00ff00';
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        async function connectBluetooth(devId) {
            try {
                const isDev1 = devId === 'dev1';
                const typeName = isDev1 ? '体内' : '体外';
                const targetName = isDev1 ? NAME_INTERNAL : NAME_EXTERNAL;
                const statusDotId = isDev1 ? 'btStatusDev1' : 'btStatusDev2';
                const statusTextId = isDev1 ? 'btStatusTextDev1' : 'btStatusTextDev2';
                
                log(`正在请求 ${typeName} 设备 [${targetName}]...`);
                
                // 根据对应设备名做精准过滤
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: targetName }],
                    optionalServices: [SERVICE_UUID]
                });
                
                device.addEventListener('gattserverdisconnected', () => {
                    log(`${typeName}设备 [${targetName}] 已断开连接！`, 'error');
                    document.getElementById(statusDotId).classList.remove('active');
                    document.getElementById(statusTextId).textContent = '未连接';
                    if(isDev1) txCharDev1 = null; else txCharDev2 = null;
                });

                log(`正在连接到 ${targetName}...`);
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(TX_CHAR_UUID);
                
                if(isDev1) {
                    txCharDev1 = characteristic;
                } else {
                    txCharDev2 = characteristic;
                }
                
                document.getElementById(statusDotId).classList.add('active');
                document.getElementById(statusTextId).textContent = '已连接';
                
                log(`${typeName}设备 [${targetName}] 连接成功！`, 'success');
                audio.play().catch(() => {});

                // 防休眠
                if (keepAliveInterval) clearInterval(keepAliveInterval);
                keepAliveInterval = setInterval(() => {
                    try {} catch (e) {}
                }, 10000);

            } catch (error) {
                log(`蓝牙连接失败: ${error.message || error}`, 'error');
            }
        }

        async function sendCommand(action, value) {
            value = parseInt(value, 10) || 0;
            let dataArray = null;
            let targetChar = null;
            let typeName = '';

            // 指令分流：震动伸缩控制体内(Dev1)，吮吸控制体外(Dev2)
            if (action === 'vibrate' || action === 'intensity') {
                if (action === 'intensity') value = Math.round(value / 10);
                value = Math.min(Math.max(value, 0), 10);
                dataArray = new Uint8Array([0x55, 0x03, 0x00, 0x00, 0x01, value, 0x00]);
                targetChar = txCharDev1;
                typeName = '体内 (震动)';
            } else if (action === 'oscillate') {
                value = Math.min(Math.max(value, 0), 7);
                dataArray = new Uint8Array([0x55, 0x08, 0x00, 0x00, value, 0x00, 0x00]);
                targetChar = txCharDev1;
                typeName = '体内 (伸缩)';
            } 
            else if (action === 'suck') {
                value = Math.min(Math.max(value, 0), 100);
                let mappedValue = Math.round((value / 100) * 255);
                if (mappedValue === 0) {
                    dataArray = new Uint8Array([0x55, 0x04, 0x00, 0x00, 0x00, 0x00, 0xAA]);
                } else {
                    dataArray = new Uint8Array([0x55, 0x04, 0x00, 0x00, 0x01, mappedValue, 0xAA]);
                }
                targetChar = txCharDev2;
                typeName = '体外 (吮吸)';
            } else if (action === 'stop') {
                if (txCharDev1) {
                    await txCharDev1.writeValue(new Uint8Array([0x55, 0x03, 0x00, 0x00, 0x01, 0, 0x00]));
                    await txCharDev1.writeValue(new Uint8Array([0x55, 0x08, 0x00, 0x00, 0, 0x00, 0x00]));
                }
                if (txCharDev2) {
                    await txCharDev2.writeValue(new Uint8Array([0x55, 0x04, 0x00, 0x00, 0x00, 0x00, 0xAA]));
                }
                log('已停止所有设备动作。', 'cmd');
                return;
            }

            if (dataArray) {
                if (!targetChar) {
                    log(`⚠️ 无法执行 ${action}，因为对应的 ${typeName} 设备未连接！`, 'error');
                    return;
                }
                try {
                    await targetChar.writeValue(dataArray);
                    log(`执行 ${action}: ${value} (${typeName})`, 'cmd');
                    
                    const slider = document.getElementById(action + 'Slider');
                    const valDisplay = document.getElementById(action + 'Val');
                    if (slider && valDisplay) {
                        slider.value = value;
                        valDisplay.textContent = value;
                    }
                } catch (error) {
                    log(`发送指令失败: ${error}`, 'error');
                }
            }
        }

        async function stopAll() {
            await sendCommand('stop', 0);
        }

        function sendTestCommand(action, value) {
            sendCommand(action, value);
            if (audio.paused) audio.play();
        }

        function toggleMcp() {
            if (isMcpRunning) stopMcp();
            else startMcp();
        }

        async function startMcp() {
            const baseUrl = document.getElementById('mcpUrl').value.replace(/\/$/, '');
            const password = document.getElementById('mcpPassword').value;
            const fetchUrl = `${baseUrl}/toy-next?secret=${password}`;
            
            isMcpRunning = true;
            document.getElementById('btnConnectMcp').textContent = '停止 MCP 轮询';
            document.getElementById('btnConnectMcp').classList.add('danger');
            document.getElementById('mcpStatus').classList.add('active');
            document.getElementById('mcpStatusText').textContent = '轮询中...';
            log('🚀 开始向服务器轮询...');

            let isFetching = false;
            mcpInterval = setInterval(async () => {
                if (isFetching) return; 
                isFetching = true;

                try {
                    const response = await fetch(fetchUrl);
                    if (response.status === 401) throw new Error(`401 未授权`);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    
                    const data = await response.json();
                    if (data && data.command && data.command.action) {
                        const cmd = data.command;
                        log(`📥 收到云端指令: ${cmd.action} = ${cmd.value}`, 'success');
                        await sendCommand(cmd.action, cmd.value);
                    }
                } catch (error) {
                    log(`轮询异常: ${error.message}`, 'error');
                } finally {
                    isFetching = false;
                }
            }, 300);
        }

        function stopMcp() {
            isMcpRunning = false;
            if (mcpInterval) clearInterval(mcpInterval);
            document.getElementById('btnConnectMcp').textContent = '启动 MCP 轮询';
            document.getElementById('btnConnectMcp').classList.remove('danger');
            document.getElementById('mcpStatus').classList.remove('active');
            document.getElementById('mcpStatusText').textContent = '已停止';
            log('已停止轮询');
        }
    </script>
</body>
</html>
